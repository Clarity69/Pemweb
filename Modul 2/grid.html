<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan CSS Grid</title>
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 120px);
            gap: 15px;
            background-color: #f2f2f2;
            padding: 15px;
        }

        .grid-item {
            color: white;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-family: Arial, sans-serif;
            font-weight: bold;
        }
        .item-1 {
            background-color: #e74c3c;
        }
        .item-2 {
            background-color: #3498db;
        }
        .item-3 {
            background-color: #2ecc71;
        }
        .item-4 {
            background-color: #f1c40f;
        }
        .item-5 {
            background-color: #9b59b6;
        }

        /* Ungu */
        .item-6 {
            background-color: #e67e22;
        }
        .item-1 {
            grid-column: span 2;
        }
    </style>
</head>

<body>

    <div class="grid-container">
        <div class="grid-item item-1">Item 1</div>
        <div class="grid-item item-2">Item 2</div>
        <div class="grid-item item-3">Item 3</div>
        <div class="grid-item item-4">Item 4</div>
        <div class="grid-item item-5">Item 5</div>
        <div class="grid-item item-6">Item 6</div>
    </div>

</body>

</html>
