<!DOCTYPE html>
<html>

<head>
    <style>
        p {
            color: red;
        }

        .highlight {
            background-color: yellow;
        }

        #judul {
            font-size: 24px;
        }

        .bordered {
            border: 1px solid black;
            color: blue;
        }
    </style>
</head>

<body>

    <p>Paragraf biasa</p>
    <p class="highlight">Paragraf dengan highlight</p>
    <h1 id="judul">Judul Halaman</h1>
    <p class="bordered">Paragraf lagi</p>

</body>

</html>
