<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMB cuy university</title>
    <style>
        body{
            background-color: ;
        }
        fieldset{
            border: 1px solid black;
            border-radius: 10px;
            padding: 15px;
        }
        .header-container img {
            width: 60px;
            height: auto;
        }

        .header-container h1 {
            margin: 0;
            font-size: 24px;
        }

        .header-container{
            display: flex;
            align-items: center;
            padding: 10px;
            gap: 10px;
        }

        input[type="text"], input[type="email"]{
            padding: 10px;
            margin: 5px 0;
            display: flex;
            border: 1px solid black;
            border-radius: 5px;
            width: 99%;
        }
        input[type="radio"]{
            margin: 5px 0;
            display: flex;
            border: 1px solid black;
            border-radius: 5px;
            width: 99%;
        }
    </style>
</head>

<body>

    <!-- Judul -->
<div class="header-container">
    <img src="stitek.jpg" alt="Logo STITEK">
    <h1>Formulir Pendaftaran Mahasiswa</h1>
</div>

    <form>
        <!-- Fieldset/ Grouping related input -->
        <fieldset class="data-prv">
            <legend>Data Pribadi</legend>
            <label for="nama">Nama</label>
            <input type="text" id="nama" name="nama" required placeholder="John Doe">
            <br>
            <label for="nama">Email</label>
            <input type="email" id="email" name="email" required placeholder="John@gmail.com">
            <br>
            <label for="JK">Jenis Kelamin</label>
            <input type="radio">Laki-laki
            <input type="radio">Perempuan
            <br>
        </fieldset>
        <fieldset class="data-mhs">
            <legend>Data Mahasiswa</legend>
            <label for="hobi">Hobi</label>
            <input type="checkbox" id="hobi">Olahraga
            <input type="checkbox" id="hobi">Membaca
            <input type="checkbox" id="hobi">Menulis
            <br>

            <label for="jurusan">Jurusan</label>
            <select id="jurusan" name="jurusan">
                <option value="TI">Teknik Informatika</option>
                <option value="SI">Sistem Informasi</option>
                <option value="EL">Teknik Elektro</option>
                <option value="ME">Manajemen</option>
                </option>
            </select>
        </fieldset>             
        <button type="submit">Kirim</button>
    </form>
</body>
</html>
